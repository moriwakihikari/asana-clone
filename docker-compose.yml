services:
  postgres:
    image: postgres:16-alpine
    container_name: asana_postgres
    environment:
      POSTGRES_DB: asana
      POSTGRES_USER: asana
      POSTGRES_PASSWORD: asana_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asana"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: asana_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asana_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: asana
      DB_PASSWORD: asana_password
      DB_NAME: asana
      DB_SSLMODE: disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-key-change-in-production
      SERVER_PORT: 8080
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: asana_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:
